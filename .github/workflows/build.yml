name: Build PanelApex APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set Gradle version
        run: sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: panelapex-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 1

      - name: Get version
        id: ver
        run: echo "VERSION=$(grep versionName app/build.gradle | grep -v '//' | head -1 | sed 's/.*versionName[[:space:]]*"//;s/".*//')" >> $GITHUB_OUTPUT

      - name: Create or update Release
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          APK="app/build/outputs/apk/release/app-release.apk"
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"

          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)

          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/v$VERSION"
            sleep 2
          fi

          RELEASE_ID=$(curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"v$VERSION\",\"name\":\"PanelApex v$VERSION\",\"body\":\"\",\"draft\":false,\"prerelease\":false}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=panelapex.apk" \
            --data-binary @$APK | python3 -c "import sys,json; d=json.load(sys.stdin); print('APK URL:', d.get('browser_download_url','error'))"
